stages:
  - verify
  - build
  - release

variables:
  GIT_DEPTH: 0
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  ELECTRON_CACHE: "$CI_PROJECT_DIR/.cache/electron"
  ELECTRON_BUILDER_CACHE: "$CI_PROJECT_DIR/.cache/electron-builder"

default:
  tags:
    - local

# ── Verify (master push — fast compile check) ─────────────────────────────────
verify:
  stage: verify
  image: node:20-bookworm
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - .npm/
    policy: pull-push
  before_script:
    - npm ci --prefer-offline
  script:
    - npm run build
  only:
    - master

# ── Linux Build (AppImage + deb) ───────────────────────────────────────────────
build:linux:
  stage: build
  image: node:20-bookworm
  cache:
    - key: npm-$CI_COMMIT_REF_SLUG
      paths:
        - .npm/
      policy: pull
    - key: electron-builder-linux
      paths:
        - .cache/electron/
        - .cache/electron-builder/
      policy: pull-push
  before_script:
    - apt-get update && apt-get install -y libarchive-tools dpkg-dev fakeroot rpm
    - npm ci --prefer-offline
  script:
    - npm run build
    - npx electron-builder --linux AppImage deb --publish never
  artifacts:
    paths:
      - dist/*.AppImage
      - dist/*.deb
      - dist/latest-linux.yml
    expire_in: 1 week
  only:
    - tags

# ── Windows Build (cross-compile with Wine) ───────────────────────────────────
build:windows:
  stage: build
  image: electronuserland/builder:wine-mono
  cache:
    - key: npm-$CI_COMMIT_REF_SLUG
      paths:
        - .npm/
      policy: pull
    - key: electron-builder-windows
      paths:
        - .cache/electron/
        - .cache/electron-builder/
      policy: pull-push
  before_script:
    - npm ci --prefer-offline
    # Force-install Windows platform-specific native modules
    # npm skips @lydell/node-pty-win32-x64 on Linux due to os:["win32"] constraint
    - npm install @lydell/node-pty-win32-x64@1.2.0-beta.12 --no-save --force
  script:
    - npm run build
    - npx electron-builder --win nsis --x64 --publish never
  artifacts:
    paths:
      - dist/*.exe
      - dist/latest.yml
    expire_in: 1 week
  only:
    - tags

# ── Create GitLab Release ──────────────────────────────────────────────────────
release:
  stage: release
  image: node:20-alpine
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  script:
    - node scripts/create-release.mjs
  only:
    - tags
