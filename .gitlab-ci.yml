stages:
  - verify
  - build
  - release
  - mirror

variables:
  GIT_DEPTH: "0"
  NODE_ENV: development
  npm_config_cache: "/tmp/npm-cache"
  ELECTRON_CACHE: "/tmp/.cache/electron"
  ELECTRON_BUILDER_CACHE: "/tmp/.cache/electron-builder"

# Verify (master push)
verify:
  stage: verify
  tags:
    - local
  image: node:22-bookworm
  before_script:
    - rm -rf node_modules
    - npm ci --prefer-offline
  script:
    - npm run build
  only:
    - master

# Linux Build
build_linux:
  stage: build
  tags:
    - local
  image: node:22-bookworm
  before_script:
    - apt-get update -qq && apt-get install -y -qq libarchive-tools dpkg-dev fakeroot rpm
    - rm -rf node_modules
    - npm ci --prefer-offline
  script:
    - npm run build
    - npx electron-builder --linux AppImage deb --x64 --publish never
    - ls -lh dist/
  artifacts:
    paths:
      - dist/*.AppImage
      - dist/*.deb
      - dist/latest-linux.yml
    expire_in: 1 week
  only:
    - tags

# Windows Build
build_windows:
  stage: build
  tags:
    - local
  image: electronuserland/builder:wine-mono
  variables:
    GIT_STRATEGY: clone
  before_script:
    - npm ci --prefer-offline
    - npm install @lydell/node-pty-win32-x64@1.2.0-beta.12 --no-save --force
  script:
    - npm run build
    - npx electron-builder --win nsis --x64 --publish never
  artifacts:
    paths:
      - dist/*.exe
      - dist/latest.yml
    expire_in: 1 week
  only:
    - tags

# Create GitLab Release
release:
  stage: release
  tags:
    - local
  image: node:22-alpine
  needs:
    - job: build_linux
      artifacts: true
    - job: build_windows
      artifacts: true
  script:
    - node scripts/create-release.mjs
  only:
    - tags

# Mirror to GitHub (one-way sync from GitLab)
mirror-github:
  stage: mirror
  tags:
    - local
  image: alpine:latest
  variables:
    GIT_STRATEGY: clone
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@codebrain.dev"
    - git config --global user.name "Codebrain CI"
  script:
    - git remote add github https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/codebrain.git || true
    - git push github HEAD:refs/heads/master --force --tags
  only:
    - master
    - tags
