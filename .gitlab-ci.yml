stages:
  - verify
  - build
  - release

variables:
  GIT_DEPTH: "0"
  NODE_ENV: development
  npm_config_cache: "/tmp/npm-cache"
  ELECTRON_CACHE: "/tmp/.cache/electron"
  ELECTRON_BUILDER_CACHE: "/tmp/.cache/electron-builder"

# Verify (master push)
verify:
  stage: verify
  tags:
    - local
  image: node:22-bookworm
  before_script:
    - rm -rf node_modules
    - npm ci --prefer-offline
  script:
    - npm run build
  only:
    - master

# Linux Build
build_linux:
  stage: build
  tags:
    - local
  image: node:22-bookworm
  before_script:
    - apt-get update -qq && apt-get install -y -qq libarchive-tools dpkg-dev fakeroot rpm
    - rm -rf node_modules
    - npm ci --prefer-offline
  script:
    - npm run build
    - npx electron-builder --linux AppImage deb --x64 --publish never
    - ls -lh dist/
  artifacts:
    paths:
      - dist/*.AppImage
      - dist/*.deb
      - dist/latest-linux.yml
    expire_in: 1 week
  only:
    - tags

# Windows Build
build_windows:
  stage: build
  tags:
    - local
  image: electronuserland/builder:wine-mono
  variables:
    GIT_STRATEGY: clone
  before_script:
    - npm ci --prefer-offline
    - npm install @lydell/node-pty-win32-x64@1.2.0-beta.12 --no-save --force
  script:
    - npm run build
    - npx electron-builder --win nsis --x64 --publish never
  artifacts:
    paths:
      - dist/*.exe
      - dist/latest.yml
    expire_in: 1 week
  only:
    - tags

# macOS Build (requires a self-hosted runner with tag: macos)
# Run manually when a macOS runner is available
build_macos:
  stage: build
  tags:
    - macos
  when: manual
  allow_failure: true
  before_script:
    - rm -rf node_modules
    - npm ci --prefer-offline
  script:
    - npm run build
    - npx electron-builder --mac dmg zip --x64 --arm64 --publish never
    - ls -lh dist/
  artifacts:
    paths:
      - dist/*.dmg
      - dist/*.zip
      - dist/latest-mac.yml
    expire_in: 1 week
  only:
    - tags

# Create GitLab Release
release:
  stage: release
  tags:
    - local
  image: node:22-alpine
  needs:
    - job: build_linux
      artifacts: true
    - job: build_windows
      artifacts: true
    - job: build_macos
      artifacts: true
      optional: true
  script:
    - node scripts/create-release.mjs
  only:
    - tags
