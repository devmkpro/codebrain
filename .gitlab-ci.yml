stages:
  - verify
  - build
  - release

variables:
  GIT_DEPTH: 0
  NODE_ENV: development
  npm_config_cache: "/tmp/npm-cache"
  ELECTRON_CACHE: "/tmp/.cache/electron"
  ELECTRON_BUILDER_CACHE: "/tmp/.cache/electron-builder"

default:
  tags:
    - local

# ── Verify (master push — fast compile check) ─────────────────────────────────
verify:
  stage: verify
  image: node:22-bookworm
  before_script:
    - rm -rf node_modules
    - npm ci --prefer-offline
  script:
    - npm run build
  only:
    - master

# ── Linux Build (AppImage + deb) ───────────────────────────────────────────────
build:linux:
  stage: build
  image: node:22-bookworm
  before_script:
    - apt-get update -qq && apt-get install -y -qq libarchive-tools dpkg-dev fakeroot rpm
    - rm -rf node_modules
    - npm ci --prefer-offline
  script:
    - npm run build
    - npx electron-builder --linux AppImage deb --x64 --publish never
    - echo "=== Generated artifacts ==="
    - ls -lh dist/*.AppImage dist/*.deb dist/latest-linux.yml 2>/dev/null || echo "WARNING: Some expected artifacts missing!"
    - "ls dist/*.deb 2>/dev/null || (echo 'ERROR: .deb file was NOT generated!' && exit 1)"
  artifacts:
    paths:
      - dist/*.AppImage
      - dist/*.deb
      - dist/latest-linux.yml
    expire_in: 1 week
  only:
    - tags

# ── Windows Build (cross-compile with Wine) ───────────────────────────────────
build:windows:
  stage: build
  image: electronuserland/builder:wine-mono
  variables:
    GIT_STRATEGY: clone
  before_script:
    - npm ci --prefer-offline
    - npm install @lydell/node-pty-win32-x64@1.2.0-beta.12 --no-save --force
  script:
    - npm run build
    - npx electron-builder --win nsis --x64 --publish never
  artifacts:
    paths:
      - dist/*.exe
      - dist/latest.yml
    expire_in: 1 week
  only:
    - tags

# ── Create GitLab Release ──────────────────────────────────────────────────────
release:
  stage: release
  image: node:22-alpine
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  script:
    - node scripts/create-release.mjs
  only:
    - tags
